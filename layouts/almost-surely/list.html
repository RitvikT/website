{{ partial "header.html" . }}

<main>
  {{ .Content }}

  {{ range .Pages }}
  <div style="margin-bottom: 1.5em; padding-bottom: 1.5em; border-bottom: 1px solid #eee;">
    <div><a href="{{ .Permalink }}"><b>{{ .Title }}</b></a></div>
    {{ with .Params.subtitle }}<div>{{ . }}</div>{{ end }}
    <div style="color: #aaa; font-size: 0.85em;">{{ .Date.Format "January 2, 2006" }}</div>
  </div>
  {{ end }}
</main>

{{ partial "footer.html" . }}
