<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; }
  .legend { display: flex; gap: 1.5rem; margin-bottom: 0.8rem; flex-wrap: wrap; padding: 0 4px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .country { fill: #e8e8e8; stroke: #fff; stroke-width: 0.5; cursor: grab; }
  .state   { fill: #e8e8e8; stroke: #fff; stroke-width: 0.5; cursor: grab; }
  .been  { fill: #EF9F27; }
  .going { fill: #378ADD; }
  .want  { fill: #1D9E75; }
  .country:hover, .state:hover { opacity: 0.75; }
  #tooltip {
    position: fixed;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: #333;
    pointer-events: none;
    display: none;
    z-index: 100;
    max-width: 220px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  #tooltip strong { display: block; margin-bottom: 2px; }
  .controls { display: flex; gap: 8px; margin-bottom: 0.8rem; padding: 0 4px; align-items: center; flex-wrap: wrap; }
  .tab { font-size: 13px; padding: 4px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; color: #555; }
  .tab.active { background: #333; color: white; border-color: #333; }
  .zoom-btn { font-size: 16px; width: 28px; height: 28px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
  .zoom-btn:hover { background: #f0f0f0; }
  .reset-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; color: #555; }
  .reset-btn:hover { background: #f0f0f0; }
  .divider { width: 1px; height: 20px; background: #ddd; }
  #map { cursor: grab; }
  #map:active { cursor: grabbing; }
</style>
</head>
<body>

<!-- ============================================================
     EDIT THIS SECTION TO UPDATE THE MAP
     status: "been" (orange), "going" (blue), "want" (green)
     ============================================================ -->
<script>
const COUNTRY_STATUS = {
  "United States of America": { status: "been",  note: "Educated there!" },
  "Italy":                    { status: "been", note: "Vacation!" },
  "India":                    { status: "been", note: "Vacation!" },
  "Kenya":                    { status: "going", note: "Conference travel!" },
  "Egypt":                    { status: "going", note: "Vacation!" },
  "Singapore":                { status: "want", note: "Conference travel!" },
  "Austria":                  { status: "want", note: "Conference travel!" },
  "Brazil":                   { status: "want", note: "Conference travel!" },
};

const STATE_STATUS = {
  "California":   { status: "been",  note: "Did undergrad there!" },
  "Pennsylvania": { status: "been",  note: "Conference travel!" },
  "Florida":      { status: "been",  note: "Grew up there!" },
  "Texas":        { status: "been",  note: "Family travel!" },
  "Maryland":        { status: "been",  note: "Family travel!" },
  "Massachusetts":        { status: "been",  note: "Family/recreational travel!" },
  "Rhode Island": { status: "been", note: "Doing Ph.D. there!" },
};
</script>
<!-- ============================================================ -->

<div id="tooltip"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>Visited</div>
  <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>Upcoming</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Want to go</div>
</div>

<div class="controls">
  <button class="tab active" onclick="showWorld()">World</button>
  <button class="tab" onclick="showUSA()">United States</button>
  <div class="divider"></div>
  <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</button>
  <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">−</button>
  <button class="reset-btn" onclick="resetZoom()">Reset</button>
</div>

<svg id="map" style="width:100%; height:auto; display:block;"></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const tt = document.getElementById("tooltip");
const svg = d3.select("#map");
let gMain;
let currentZoom;
let currentView = "world";

function showTooltip(e, name, note) {
  tt.style.display = "block";
  tt.style.left = (e.clientX + 12) + "px";
  tt.style.top  = (e.clientY - 10) + "px";
  tt.innerHTML = `<strong>${name}</strong>${note || ""}`;
}
function hideTooltip() { tt.style.display = "none"; }

function getClass(status, base) {
  return base + (status ? " " + status.status : "");
}

function setupZoom(viewBox) {
  const [,, w, h] = viewBox.split(" ").map(Number);
  currentZoom = d3.zoom()
    .scaleExtent([1, 12])
    .translateExtent([[0, 0], [w, h]])
    .on("zoom", (e) => {
      gMain.attr("transform", e.transform);
    });
  svg.call(currentZoom);
}

function zoomIn()   { svg.transition().duration(300).call(currentZoom.scaleBy, 1.5); }
function zoomOut()  { svg.transition().duration(300).call(currentZoom.scaleBy, 1 / 1.5); }
function resetZoom(){ svg.transition().duration(400).call(currentZoom.transform, d3.zoomIdentity); }

function showWorld() {
  currentView = "world";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[0].classList.add("active");
  const vb = "0 0 960 500";
  svg.attr("viewBox", vb);
  svg.selectAll("*").remove();
  gMain = svg.append("g");
  setupZoom(vb);

  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(world => {
    const proj = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
    const path = d3.geoPath().projection(proj);
    const countries = topojson.feature(world, world.objects.countries);

    gMain.selectAll(".country")
      .data(countries.features)
      .join("path")
      .attr("class", d => getClass(COUNTRY_STATUS[d.properties?.name], "country"))
      .attr("d", path)
      .on("mousemove", (e, d) => {
        const s = COUNTRY_STATUS[d.properties?.name];
        if (s) showTooltip(e, d.properties.name, s.note);
        else hideTooltip();
      })
      .on("mouseleave", hideTooltip);
  });
}

function showUSA() {
  currentView = "usa";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[1].classList.add("active");
  const vb = "0 0 960 600";
  svg.attr("viewBox", vb);
  svg.selectAll("*").remove();
  gMain = svg.append("g");
  setupZoom(vb);

  const stateNames = {
    "01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas","06":"California",
    "08":"Colorado","09":"Connecticut","10":"Delaware","11":"District of Columbia",
    "12":"Florida","13":"Georgia","15":"Hawaii","16":"Idaho","17":"Illinois",
    "18":"Indiana","19":"Iowa","20":"Kansas","21":"Kentucky","22":"Louisiana",
    "23":"Maine","24":"Maryland","25":"Massachusetts","26":"Michigan","27":"Minnesota",
    "28":"Mississippi","29":"Missouri","30":"Montana","31":"Nebraska","32":"Nevada",
    "33":"New Hampshire","34":"New Jersey","35":"New Mexico","36":"New York",
    "37":"North Carolina","38":"North Dakota","39":"Ohio","40":"Oklahoma","41":"Oregon",
    "42":"Pennsylvania","44":"Rhode Island","45":"South Carolina","46":"South Dakota",
    "47":"Tennessee","48":"Texas","49":"Utah","50":"Vermont","51":"Virginia",
    "53":"Washington","54":"West Virginia","55":"Wisconsin","56":"Wyoming"
  };

  d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
    const proj = d3.geoAlbersUsa().scale(1100).translate([480, 300]);
    const path = d3.geoPath().projection(proj);
    const states = topojson.feature(us, us.objects.states);

    gMain.selectAll(".state")
      .data(states.features)
      .join("path")
      .attr("class", d => {
        const name = stateNames[d.id.toString().padStart(2,"0")];
        return getClass(STATE_STATUS[name], "state");
      })
      .attr("d", path)
      .on("mousemove", (e, d) => {
        const name = stateNames[d.id.toString().padStart(2,"0")];
        const s = STATE_STATUS[name];
        if (s) showTooltip(e, name, s.note);
        else hideTooltip();
      })
      .on("mouseleave", hideTooltip);
  });
}

showWorld();
</script>
</body>
</html>
